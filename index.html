<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>App Quản Lý Tài Chính Học Sinh - Bản Đặc Biệt</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --primary: #1a73e8; --gold: #fbc02d; --danger: #d93025; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 550px; }
        h2 { color: var(--primary); text-align: center; }
        .input-box { margin-bottom: 15px; }
        label { font-weight: bold; font-size: 14px; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        button { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add { background: var(--primary); color: white; grid-column: span 2; }
        .btn-summary { background: var(--gold); color: black; }
        .btn-cert { background: #34a853; color: white; display: none; } /* Chỉ hiện khi thắng */
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
        .over { color: var(--danger); font-weight: bold; }
        #adviceBox { margin-top: 15px; padding: 12px; border-radius: 10px; background: #fff5f5; border-left: 5px solid var(--danger); display: none; }
    </style>
</head>
<body onload="initApp()">

<div class="container">
    <h2>💰 Quản Lý Tài Chính Tài Ba</h2>
    
    <div class="input-box">
        <label>Ngân sách tuần (VNĐ):</label>
        <input type="number" id="budgetInput" value="500000" onchange="updateUI()">
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <select id="ruleSelect" onchange="applyRule()">
            <option value="6jars">Quy tắc 6 Chiếc lọ</option>
            <option value="502030">Quy tắc 50-20-30</option>
        </select>
        <select id="itemCategory"></select>
    </div>

    <div class="input-box" style="margin-top: 10px;">
        <input type="text" id="itemName" placeholder="Tên món đồ (VD: Bánh mì)">
        <input type="number" id="itemPrice" placeholder="Số tiền (VNĐ)" style="margin-top: 10px;">
    </div>

    <div class="btn-group">
        <button class="btn-add" onclick="addItem()">➕ Thêm khoản chi</button>
        <button class="btn-summary" onclick="summarize()">🏆 Tổng kết tuần</button>
        <button id="certBtn" class="btn-cert" onclick="generateCertificate()">🎓 Nhận Chứng Chỉ</button>
    </div>

    <div id="adviceBox">
        <small>💡 <b>Lời khuyên:</b> <span id="adviceText"></span></small>
    </div>

    <canvas id="myChart" style="max-height: 200px; margin-top: 15px;"></canvas>

    <table>
        <thead><tr><th>Hạng mục</th><th>Định mức</th><th>Đã chi</th><th>Còn lại</th></tr></thead>
        <tbody id="ruleBody"></tbody>
    </table>
</div>

<script>
    let rules = {
        "6jars": {"Thiết yếu": 0.55, "Đầu tư": 0.1, "Tiết kiệm": 0.1, "Hưởng thụ": 0.1, "Giáo dục": 0.1, "Từ thiện": 0.05},
        "502030": {"Thiết yếu": 0.5, "Tài chính": 0.2, "Cá nhân": 0.3}
    };
    let currentSpent = {};
    let myChart;

    function initApp() {
        const ctx = document.getElementById('myChart').getContext('2d');
        myChart = new Chart(ctx, { type: 'bar', data: { labels: [], datasets: [{ label: 'Đã tiêu', data: [], backgroundColor: '#4285f4' }] } });
        applyRule();
    }

    function applyRule() {
        const selected = document.getElementById('ruleSelect').value;
        const cats = Object.keys(rules[selected]);
        currentSpent = {};
        cats.forEach(c => currentSpent[c] = 0);
        document.getElementById('itemCategory').innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
        updateUI();
    }

    function addItem() {
        const name = document.getElementById('itemName').value;
        const price = parseFloat(document.getElementById('itemPrice').value);
        const cat = document.getElementById('itemCategory').value;
        if (!name || isNaN(price)) return;
        currentSpent[cat] += price;
        updateUI();
        document.getElementById('itemName').value = "";
        document.getElementById('itemPrice').value = "";
    }

    function updateUI() {
        const budget = parseFloat(document.getElementById('budgetInput').value) || 0;
        const selected = document.getElementById('ruleSelect').value;
        const ruleData = rules[selected];
        const tbody = document.getElementById('ruleBody');
        tbody.innerHTML = "";
        let labels = [], data = [], over = false;

        for (let cat in ruleData) {
            let limit = budget * ruleData[cat], spent = currentSpent[cat], rem = limit - spent;
            if (rem < 0) over = true;
            tbody.innerHTML += `<tr><td>${cat}</td><td>${limit.toLocaleString()}</td><td>${spent.toLocaleString()}</td><td class="${rem<0?'over':''}">${rem.toLocaleString()}</td></tr>`;
            labels.push(cat); data.push(spent);
        }
        myChart.data.labels = labels; myChart.data.datasets[0].data = data; myChart.update();
        document.getElementById('adviceBox').style.display = over ? "block" : "none";
        document.getElementById('adviceText').innerText = "Bạn đang chi quá mức, hãy cân nhắc cắt giảm hạng mục màu đỏ!";
    }

    function summarize() {
        let over = Array.from(document.querySelectorAll('.over')).length > 0;
        if (!over && Object.values(currentSpent).some(v => v > 0)) {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            document.getElementById('certBtn').style.display = "block";
            alert("Tuyệt vời! Bạn không vi phạm định mức nào. Nút 'Nhận Chứng Chỉ' đã xuất hiện!");
        } else {
            alert("Hãy cố gắng cân đối chi tiêu để không bị âm tiền nhé!");
        }
    }

    // --- HÀM TẠO CHỨNG CHỈ PDF ---
    function generateCertificate() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: "landscape" });
        const name = prompt("Nhập họ và tên của em để in lên chứng chỉ:", "Nguyễn Văn A");
        if (!name) return;

        // Vẽ khung viền
        doc.setLineWidth(5);
        doc.setDrawColor(26, 115, 232);
        doc.rect(10, 10, 277, 190); 

        // Tiêu đề
        doc.setTextColor(26, 115, 232);
        doc.setFontSize(30);
        doc.text("CHUNG CHI QUAN LY TAI CHINH", 148, 50, { align: "center" });

        // Nội dung vinh danh
        doc.setTextColor(0, 0, 0);
        doc.setFontSize(18);
        doc.text("Chuc mung nha quan ly tai ba:", 148, 80, { align: "center" });
        
        doc.setFontSize(25);
        doc.setTextColor(217, 48, 37);
        doc.text(name.toUpperCase(), 148, 100, { align: "center" });

        doc.setFontSize(16);
        doc.setTextColor(0, 0, 0);
        doc.text("Da hoan thanh xuat sac ke hoach chi tieu tuan ma khong vi pham dinh muc.", 148, 125, { align: "center" });
        doc.text(`Quy tac ap dung: ${document.getElementById('ruleSelect').options[document.getElementById('ruleSelect').selectedIndex].text}`, 148, 140, { align: "center" });

        // Con dấu giả định
        doc.setDrawColor(251, 192, 45);
        doc.setLineWidth(2);
        doc.circle(240, 160, 20);
        doc.setFontSize(10);
        doc.text("GOLD SEAL", 240, 162, { align: "center" });

        // Ngày tháng
        const date = new Date().toLocaleDateString('vi-VN');
        doc.text(`Ngay cap: ${date}`, 40, 175);

        // Lưu file
        doc.save(`Chung_Chi_Tai_Chinh_${name}.pdf`);
    }
</script>
</body>
</html>
